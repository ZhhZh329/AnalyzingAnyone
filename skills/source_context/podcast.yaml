name: podcast
display_name: "Podcast appearance (long-form conversation)"
credibility_notes: |
  Long-form podcasts (1-3 hours) are among the most revealing formats.
  The extended duration breaks down PR defenses. Guests often say things
  they wouldn't in a 10-minute TV segment.
  Key considerations:
  - Early segments more guarded, later segments more authentic
  - Rapport with host affects openness dramatically
  - Tangential stories and digressions often contain the most genuine material
  - Emotional reactions (laughter, pauses, voice changes) are informative
  - Repeat appearances on same podcast show evolution over time
weight_guidance: |
  High authenticity, especially in the second half. Among the best sources
  for genuine personality assessment. Host chemistry matters — friendly
  interviewers get different material than adversarial ones.
